name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: us-central1
  SERVICE_NAME: alphastream
  REPO_NAME: alphastream

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_APP_ENV=production \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 3000 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --concurrency 80 \
            --timeout 300s \
            --set-env-vars "AI_PROVIDER=${{ secrets.AI_PROVIDER }}" \
            --set-secrets "GOOGLE_GENERATIVE_AI_API_KEY=alphastream-google-key:latest,BRAVE_SEARCH_API_KEY=alphastream-brave-key:latest" \
            --service-account "alphastream-runner@${PROJECT_ID}.iam.gserviceaccount.com" \
            --allow-unauthenticated \
            --project "${PROJECT_ID}"
